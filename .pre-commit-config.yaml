repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, sqlalchemy, fastapi, pytest]
        args: [--strict, app/]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-logger
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.2.5
    hooks:
      - id: prettier
        types_or: [javascript, typescript, tsx, json, yaml, markdown, css, html]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.14.0
    hooks:
      - id: eslint
        files: \.(js|ts|tsx)$
        additional_dependencies: [eslint, @typescript-eslint/parser, @typescript-eslint/eslint-plugin, eslint-plugin-react-hooks, eslint-plugin-prettier, prettier]
        args: [--cache]

  - repo: local
    hooks:
      - id: pytest-backend
        name: pytest backend
        entry: bash -c 'cd backend && source venv/bin/activate && pytest -x -q'
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-frontend
        name: pytest frontend
        entry: bash -c 'cd frontend && pnpm test --run --reporter=dot'
        language: system
        pass_filenames: false
        always_run: true