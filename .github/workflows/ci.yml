name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Install frontend deps
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run backend lint
        run: |
          cd backend
          ruff check .

      - name: Run frontend lint
        run: |
          cd frontend
          pnpm lint

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: simulador_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/simulador_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
          SECRET_KEY: "test-secret-key-for-testing-only-1234567890123456789012345678901234"
          FINNHUB_API_KEY: "test"
          EXCHANGE_RATE_API_KEY: "test"
          RESEND_API_KEY: "test"

      - name: Run tests
        run: |
          cd backend
          pip install pytest-cov
          pytest -v --cov=app --cov-report=xml --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/simulador_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
          SECRET_KEY: "test-secret-key-for-testing-only-1234567890123456789012345678901234"
          FINNHUB_API_KEY: "test"
          EXCHANGE_RATE_API_KEY: "test"
          RESEND_API_KEY: "test"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install deps
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          cd frontend
          pnpm test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: simulador-backend:latest
          load: true

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: simulador-frontend:latest
          load: true

      - name: Test docker images
        run: |
          docker run --rm simulador-backend:latest python -c "import app; print('Backend OK')"
          docker run --rm simulador-frontend:latest ls /usr/share/nginx/html

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy to production
        run: echo "Deploy to production (configure your deployment target)"
